[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"
watchPatterns = [
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "Dockerfile.worker",
  "railway.worker.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
