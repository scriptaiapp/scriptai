[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"
watchPatterns = [
  "apps/api/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "turbo.json",
  "Dockerfile.api",
  "railway.api.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
